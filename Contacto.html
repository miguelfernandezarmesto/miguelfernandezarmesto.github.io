<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contacto - Miguel Fernández Armesto</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial, Helvetica, sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
text-align:center;
width:350px;
}

h1{
font-size:40px;
margin-bottom:20px;
}

.email{
font-size:20px;
color:#cbd5e1;
margin-bottom:30px;
}

/* formulario */

form{
margin-top:20px;
text-align:left;
}

label{
display:block;
margin-top:10px;
margin-bottom:5px;
}

input, textarea{
width:100%;
padding:10px;
border-radius:6px;
border:none;
margin-bottom:10px;
}

textarea{
resize:none;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.btn{
display:inline-block;
margin-top:20px;
text-decoration:none;
background:#2563eb;
color:white;
padding:12px 25px;
border-radius:8px;
font-weight:bold;
transition:0.2s;
}

.btn:hover{
background:#1d4ed8;
}

</style>

</head>

<body>

<div class="container">

<h1>Contacto</h1>

<p class="email">
miguel.fernandez.armesto@hotmail.com
</p>

<form action="https://formspree.io/f/xojkjwyp" method="POST">

<label>Nombre</label>
<input type="text" name="nombre" required>

<label>Apellidos</label>
<input type="text" name="apellidos" required>

<label>Teléfono</label>
<input type="tel" name="telefono">

<label>Información</label>
<textarea name="mensaje" rows="4"></textarea>

<button type="submit">Enviar</button>

</form>

<a class="btn" href="index.html">Inicio</a>

</div>

</body>
</html>
