<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miguel Fernández Armesto</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.container{
max-width:500px;
}

img.profile{
width:140px;
height:140px;
border-radius:50%;
margin-bottom:20px;
border:3px solid white;
}

h1{
font-size:36px;
margin-bottom:10px;
}

p{
color:#cbd5e1;
margin-bottom:25px;
}

a.button{
display:block;
background:#2563eb;
color:white;
text-decoration:none;
margin:12px auto;
padding:14px;
border-radius:10px;
width:260px;
font-weight:bold;
transition:0.2s;
}

a.button:hover{
background:#1d4ed8;
transform:scale(1.05);
}

.social{
margin-top:25px;
}

.social img{
width:45px;
margin:10px;
cursor:pointer;
transition:0.2s;
}

.social img:hover{
transform:scale(1.2);
}

</style>

</head>

<body>

<div class="container">

<img class="profile" src="https://via.placeholder.com/140">

<h1>Miguel Fernández Armesto</h1>

<p>Sitio web personal</p>

<a class="button" href="https://github.com/miguelfernandezarmesto">GitHub</a>

<a class="button" href="https://www.linkedin.com">LinkedIn</a>

<div class="social">

<a href="https://www.facebook.com/profile.php?id=61564522718463" target="_blank">
<img src="facebook.png">
</a>

<a href="https://www.instagram.com/miiguel_fdz_" target="_blank">
<img src="instagram.png">
</a>

</div>

</div>

</body>
</html>
